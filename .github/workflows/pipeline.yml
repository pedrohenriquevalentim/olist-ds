name: Design System — Pipeline

# Quando roda:
# - A cada Pull Request apontando para main (gate de merge)
# - A cada push na main (após merge aprovado)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Gate de qualidade — roda em TODO PR e push
  #
  # NÃO roda geração de código com IA aqui.
  # Testes e stories devem ser gerados localmente (npm run generate:all)
  # e commitados antes de abrir o PR. Este job apenas valida o que foi commitado.
  # ─────────────────────────────────────────────────────────
  quality:
    name: Lint + Tokens + TypeScript + Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Gerar tokens CSS
        run: npm run build:tokens

      - name: Lint
        run: npm run lint

      - name: Verificar TypeScript (inclui arquivos gerados pela IA)
        run: tsc --noEmit --allowJs false

      - name: Instalar browsers do Playwright
        run: npx playwright install chromium --with-deps

      - name: Rodar testes
        run: npm run test:run

      - name: Salvar tokens gerados
        uses: actions/upload-artifact@v4
        with:
          name: generated-tokens
          path: src/generated/
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # JOB 2: Build do Storybook
  # Só roda se o Job 1 passou.
  # Em PRs: apenas valida que o build não quebra.
  # Em push na main: faz deploy no GitHub Pages.
  # ─────────────────────────────────────────────────────────
  storybook:
    name: Build Storybook
    needs: quality
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Baixar tokens gerados
        uses: actions/download-artifact@v4
        with:
          name: generated-tokens
          path: src/generated/

      - name: Build do Storybook
        run: npm run build-storybook

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          publish_branch: storybook

  # ─────────────────────────────────────────────────────────
  # JOB 3: Publicar no GitHub Packages
  # Só roda no push para main (não em PRs).
  # Só roda se Jobs 1 e 2 passaram.
  # ─────────────────────────────────────────────────────────
  publish:
    name: Publicar no GitHub Packages
    needs: [quality, storybook]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js com registro do GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Baixar tokens gerados
        uses: actions/download-artifact@v4
        with:
          name: generated-tokens
          path: src/generated/

      - name: Build
        run: npm run build

      - name: Publicar pacote
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────
  # JOB 4: Publicar @pedrohenriquevalentim/design-tokens
  # Só roda no push para main (não em PRs).
  # Pacote e versão independentes do pacote principal — só publica
  # se a versão em packages/design-tokens/package.json ainda não
  # existir no registro (evita falhar em merges onde só o pacote
  # principal mudou de versão).
  # ─────────────────────────────────────────────────────────
  publish-tokens:
    name: Publicar design-tokens no GitHub Packages
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js com registro do GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build do pacote de tokens
        run: npm run build --workspace=packages/design-tokens

      - name: Verificar se a versão já foi publicada
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./packages/design-tokens/package.json').version")
          if npm view "@pedrohenriquevalentim/design-tokens@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar pacote
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --workspace=packages/design-tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
