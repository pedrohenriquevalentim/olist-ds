name: Design System — Pipeline

# Quando roda:
# - A cada Pull Request apontando para main (gate de merge)
# - A cada push na main (após merge aprovado)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Gate de qualidade — roda em TODO PR e push
  #
  # NÃO roda geração de código com IA aqui.
  # Testes e stories devem ser gerados localmente (npm run generate:all)
  # e commitados antes de abrir o PR. Este job apenas valida o que foi commitado.
  # ─────────────────────────────────────────────────────────
  quality:
    name: Lint + Tokens + TypeScript + Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Gerar tokens CSS
        run: npm run build:tokens

      - name: Verificar TypeScript (inclui arquivos gerados pela IA)
        run: tsc --noEmit --allowJs false

      - name: Rodar testes
        run: npm run test:run

  # ─────────────────────────────────────────────────────────
  # JOB 2: Build do Storybook
  # Só roda se o Job 1 passou.
  # Em PRs: apenas valida que o build não quebra.
  # Em push na main: faz deploy no GitHub Pages.
  # ─────────────────────────────────────────────────────────
  storybook:
    name: Build Storybook
    needs: quality
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Gerar tokens
        run: npm run build:tokens

      - name: Build do Storybook
        run: npm run build-storybook

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static

  # ─────────────────────────────────────────────────────────
  # JOB 3: Publicar no GitHub Packages
  # Só roda no push para main (não em PRs).
  # Só roda se Jobs 1 e 2 passaram.
  # ─────────────────────────────────────────────────────────
  publish:
    name: Publicar no GitHub Packages
    needs: [quality, storybook]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js com registro do GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Gerar tokens
        run: npm run build:tokens

      - name: Build
        run: npm run build

      - name: Publicar pacote
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
